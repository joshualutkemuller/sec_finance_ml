scenario_id: S13
name: Combined Stress
description: >
  Multi-factor adverse scenario combining moderate versions of rate, credit, equity,
  and liquidity shocks. More realistic than single-factor scenarios — financial
  crises rarely affect just one variable. Tests portfolio resilience under
  plausible-but-severe combined market stress.
severity: Extreme

shocks:
  rate_shift_bps: 150
  sofr_shock_bps: 150
  short_end_shift_bps: 175
  long_end_shift_bps: 100
  ig_spread_shock_bps: 200
  hy_spread_shock_bps: 600
  equity_shock_pct: -0.15
  vol_shock_multiplier: 2.5
  bid_ask_multiplier: 3.5
  market_depth_reduction_pct: 0.35
  demand_surge_factor: 1.3
  remove_counterparty_ids: []
  recall_risk_spillover_factor: 1.5
  replacement_cost_bps: 10
  haircut_floor_increase_pp: 2
  exclude_asset_classes: []

reporting:
  push_to_powerbi: true
  generate_pdf: true
  alert_on_breach: true
  breach_thresholds:
    collateral_shortfall_usd: 3000000
    financing_cost_delta_bps: 75
    eligible_pool_shrinkage_pct: 0.12
    capital_charge_delta_usd: 3000000
