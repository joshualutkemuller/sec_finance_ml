scenario_id: S12
name: Liquidity Squeeze
description: >
  Market liquidity evaporates — bid-ask spreads multiply 7x and market depth falls 70%.
  Replicates March 2020 US Treasury liquidity crisis or 1998 LTCM collapse.
  Effective collateral liquidation values fall significantly below mark-to-market
  as fire-sale discounts dominate.
severity: Extreme

shocks:
  rate_shift_bps: 0
  sofr_shock_bps: 50
  ig_spread_shock_bps: 100
  hy_spread_shock_bps: 400
  equity_shock_pct: -0.10
  vol_shock_multiplier: 3.5
  bid_ask_multiplier: 7.0
  market_depth_reduction_pct: 0.70
  demand_surge_factor: 2.0
  remove_counterparty_ids: []
  recall_risk_spillover_factor: 1.8
  replacement_cost_bps: 15
  haircut_floor_increase_pp: 3
  exclude_asset_classes: []

reporting:
  push_to_powerbi: true
  generate_pdf: false
  alert_on_breach: true
  breach_thresholds:
    collateral_shortfall_usd: 5000000
    financing_cost_delta_bps: 60
    eligible_pool_shrinkage_pct: 0.15
