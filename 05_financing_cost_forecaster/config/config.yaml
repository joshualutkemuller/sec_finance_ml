# Repo & Financing Cost Forecaster — Configuration
# All path values are relative to the project root unless absolute.

data:
  repo_rates_path: "data/repo_rates.csv"
  macro_rates_path: "data/macro_rates.csv"
  positions_path: "data/positions.csv"
  budget_path: "data/budget.csv"
  lookback_days: 365          # Days of history to load for training window

model:
  horizons: [1, 3, 5]         # Forecast horizons in business days
  n_estimators: 400
  max_depth: 6
  learning_rate: 0.05
  num_leaves: 31
  random_state: 42
  min_child_samples: 20
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 0.1

features:
  lag_windows: [1, 3, 5, 10, 20]       # Lag periods for rate and spread columns
  rolling_windows: [5, 10, 20]          # Rolling stat windows (mean, std, min, max)
  use_calendar_features: true
  use_macro_features: true
  target_col: "rate_bps"                # Primary column to forecast
  group_col: "instrument_type"          # Column used to segment models

alerts:
  enabled: true
  spike_threshold_bps: 10              # bps increase vs prior day that triggers RATE_SPIKE
  budget_breach_threshold_bps: 5       # bps over budget to trigger BUDGET_BREACH
  email:
    enabled: false
    smtp_host: "smtp.example.com"
    smtp_port: 587
    sender: "forecaster@example.com"
    recipients:
      - "financing-desk@example.com"
      - "risk-management@example.com"
    use_tls: true
    # Credentials loaded from .env: SMTP_USER, SMTP_PASSWORD
  teams_webhook_url: ""                # Set via env var TEAMS_WEBHOOK_URL or here
  log_path: "logs/alerts.log"

powerbi:
  enabled: false
  workspace_id: ""                     # PowerBI workspace UUID
  dataset_id: ""                       # PowerBI dataset UUID
  table_name: "FinancingCostForecasts"
  streaming_url: ""                    # Full streaming push URL (overrides workspace+dataset)
  # Auth token loaded from env var: POWERBI_ACCESS_TOKEN
  timeout_seconds: 10
  max_rows_per_push: 1000
